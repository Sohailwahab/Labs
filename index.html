<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Med Flash — Canadian Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f1a;
  --surface: #111827;
  --card: #1a2235;
  --border: #2a3a55;
  --accent: #38bdf8;
  --accent2: #f472b6;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --text: #e2e8f0;
  --muted: #64748b;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: Georgia, serif;
  min-height: 100vh;
  padding: 0 0 80px;
}

/* ── SCREENS ── */
.screen { display: none; padding: 24px 16px; }
.screen.active { display: block; }

/* ── HOME ── */
.home-header { text-align: center; padding: 32px 16px 20px; }
.home-header h1 {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: clamp(1.8rem, 6vw, 2.6rem); letter-spacing: -1px;
  background: linear-gradient(120deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.home-header p { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }

.search-wrap { max-width: 500px; margin: 0 auto 20px; padding: 0 16px; }
.search-container { position: relative; }
.search-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; padding: 12px 20px 12px 44px; color: var(--text);
  font-family: Georgia, serif; font-size: 0.9rem; outline: none;
  transition: border-color 0.2s, border-radius 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }
.search-container::before {
  content: '🔍';
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  font-size: 0.9rem; pointer-events: none; z-index: 1;
}
.search-container::after {
  content: '/';
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700;
  color: var(--muted); background: var(--border);
  padding: 2px 7px; border-radius: 5px; pointer-events: none;
  letter-spacing: 0; line-height: 1.6;
  transition: opacity 0.2s;
}
.search-container:focus-within::after { opacity: 0; }
.search-results {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 100; display: none;
  max-height: 360px; overflow-y: auto;
}
.search-results.open { display: block; }
.sr-section-label {
  font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--muted); padding: 10px 16px 4px;
}
.sr-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; cursor: pointer;
  transition: background 0.15s; border-bottom: 1px solid rgba(42,58,85,0.4);
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover { background: rgba(56,189,248,0.08); }
.sr-item-icon { font-size: 1.1rem; flex-shrink: 0; }
.sr-item-abbr {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 0.88rem; color: var(--accent); min-width: 60px;
}
.sr-item-info { flex: 1; min-width: 0; }
.sr-item-name { font-size: 0.82rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sr-item-cat { font-size: 0.68rem; color: var(--muted); }
.sr-item-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.75rem; color: var(--green); text-align: right; white-space: nowrap; }
.sr-empty { padding: 16px; text-align: center; color: var(--muted); font-size: 0.82rem; }

.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
  max-width: 620px;
  margin: 0 auto;
  padding: 0 16px;
}
.cat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 14px;
  cursor: pointer; text-align: center;
  transition: border-color 0.2s, transform 0.15s, background 0.2s;
  animation: fadeUp 0.3s ease both;
}
.cat-card:hover { border-color: var(--accent); transform: translateY(-3px); background: #1f2e45; }
.cat-icon { font-size: 1.8rem; margin-bottom: 8px; }
.cat-name {
  font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 0.82rem; color: var(--text); line-height: 1.3;
}
.cat-count { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── STUDY SCREEN ── */
.study-topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 16px 0;
  max-width: 560px; margin: 0 auto;
}
.back-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 0.78rem; padding: 8px 16px; border-radius: 100px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }
.study-title {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 1.1rem; flex: 1;
}

/* ── MODE TABS ── */
.mode-tabs {
  display: flex; gap: 6px; justify-content: center;
  margin: 16px 16px 20px; flex-wrap: wrap;
}
.mode-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); font-family: 'Syne', sans-serif;
  font-size: 0.78rem; font-weight: 600; padding: 8px 18px;
  border-radius: 100px; cursor: pointer; transition: all 0.2s;
}
.mode-btn:hover { color: var(--text); border-color: var(--accent); }
.mode-btn.active {
  background: linear-gradient(120deg, var(--accent), #6366f1);
  border-color: transparent; color: #fff;
}

.mode-panel { display: none; padding: 0 16px; }
.mode-panel.active { display: block; }

/* ── REFERENCE TABLE ── */
.ref-table { width: 100%; max-width: 560px; margin: 0 auto; border-collapse: collapse; }
.ref-table th {
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.7rem;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
  padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border);
}
.ref-table td {
  padding: 12px 14px; font-size: 0.88rem; line-height: 1.5;
  border-bottom: 1px solid rgba(42,58,85,0.5);
  vertical-align: middle;
}
.ref-table tr:last-child td { border-bottom: none; }
.ref-table tr:hover td { background: rgba(56,189,248,0.04); }
.ref-abbr {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 0.9rem; color: var(--accent);
}
.ref-name { color: var(--text); font-size: 0.82rem; }
.ref-val { color: var(--green); font-family: 'Syne', sans-serif; font-weight: 700; }
.ref-unit { color: var(--muted); font-size: 0.75rem; }
.ref-note { color: var(--muted); font-size: 0.72rem; font-style: italic; }
.table-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  max-width: 560px; margin: 0 auto;
}

/* ── FLASHCARDS ── */
.fc-area { display: flex; flex-direction: column; align-items: center; gap: 14px; max-width: 500px; margin: 0 auto; }
.progress-wrap { width: 100%; background: var(--surface); border-radius: 100px; height: 5px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:100px; transition:width 0.35s ease; }
.fc-counter { color: var(--muted); font-size: 0.78rem; }

.fc-viewport { width: 100%; overflow: hidden; border-radius: var(--radius); touch-action: pan-y; }
.fc-track { display: flex; will-change: transform; }
.fc-slide { flex: 0 0 100%; width: 100%; height: 290px; perspective: 1200px; cursor: pointer; user-select: none; -webkit-user-select: none; }
.flipper { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.45s cubic-bezier(0.4,0,0.2,1); border-radius:var(--radius); }
.flipper.flipped { transform: rotateY(180deg); }
.card-face { position:absolute; inset:0; border-radius:var(--radius); backface-visibility:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px 30px; text-align:center; }
.card-front { background:var(--card); border:1px solid var(--border); }
.card-back { background:linear-gradient(135deg,#0d1f17,#132d1e); border:2px solid var(--green); transform:rotateY(180deg); }
.card-abbr {
  /* Inherit the selected body font — only keep size and colour */
  font-weight: 700;
  font-size: clamp(2rem, 9vw, 3.2rem);
  letter-spacing: normal;
  color: var(--accent);
  line-height: 1.1;
  margin-bottom: 16px;
}
.card-question {
  /* Inherit body font — standard weight, relaxed spacing */
  font-weight: 400;
  font-size: 1rem;
  line-height: 1.7;
  color: var(--text);
  letter-spacing: normal;
}
.card-hint { color:var(--muted); font-size:0.72rem; margin-top:12px; }
.card-answer { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(1.4rem,5.5vw,2rem); line-height:1.55; color:var(--green); text-shadow:0 0 28px rgba(74,222,128,0.35); letter-spacing:-0.5px; }

.swipe-hint { color:var(--muted); font-size:0.7rem; letter-spacing:0.03em; transition:opacity 0.5s; }
.swipe-hint.hidden { opacity:0; }
.fc-controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.fc-btn { font-family:'Syne',sans-serif; font-weight:700; font-size:0.8rem; padding:10px 20px; border-radius:100px; border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; transition:all 0.18s; }
.fc-btn:hover { border-color:var(--accent); color:var(--accent); }
.fc-btn.primary { background:linear-gradient(120deg,var(--accent),#6366f1); border-color:transparent; color:#fff; }
.fc-btn.primary:hover { opacity:0.9; }

/* ── FONT PICKER (top-left) ── */
.font-controls {
  position: fixed; top: 16px; left: 16px; z-index: 200;
  display: flex; flex-direction: column; gap: 6px;
}
.font-toggle {
  display: flex; align-items: center; gap: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.font-btn {
  background: none; border: none; cursor: pointer;
  font-size: 0.72rem; padding: 7px 11px;
  transition: background 0.15s; line-height: 1;
  color: var(--muted); font-weight: 600; letter-spacing: 0.02em;
  white-space: nowrap;
}
.font-btn.active { background: rgba(56,189,248,0.18); color: var(--text); }
.font-toggle .font-btn:first-child { border-radius: 100px 0 0 100px; }
.font-toggle .font-btn:last-child  { border-radius: 0 100px 100px 0; }

/* Size adjuster row */
.size-toggle {
  display: flex; align-items: center; gap: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.size-btn {
  background: none; border: none; cursor: pointer;
  padding: 6px 12px; color: var(--muted);
  font-weight: 700; line-height: 1; transition: background 0.15s;
  white-space: nowrap;
}
.size-btn:hover { background: rgba(56,189,248,0.1); color: var(--text); }
.size-btn:first-child { border-radius: 100px 0 0 100px; font-size: 0.65rem; }
.size-btn:last-child  { border-radius: 0 100px 100px 0; font-size: 0.9rem; }
.size-label {
  font-family: 'Syne', sans-serif; font-size: 0.62rem; font-weight: 700;
  color: var(--muted); padding: 0 6px; letter-spacing: 0.06em;
  border-left: 1px solid var(--border); border-right: 1px solid var(--border);
  line-height: 30px; white-space: nowrap; min-width: 32px; text-align: center;
}

/* Font size CSS variable — applied to html root so rem scales everything */
html { font-size: var(--base-font-size, 16px); }

/* Font classes applied to body */
body.font-sf    { font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif; }
body.font-serif { font-family: Georgia, 'Times New Roman', serif; }
body.font-mono  { font-family: 'DM Mono', 'Courier New', monospace; }

/* ── FLAG TOGGLE (top-right) ── */
.flag-toggle {
  position: fixed; top: 16px; right: 16px; z-index: 200;
  display: flex; align-items: center; gap: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.flag-btn {
  background: none; border: none; cursor: pointer;
  font-size: 1.2rem; padding: 7px 10px;
  transition: background 0.15s; line-height: 1;
  position: relative;
}
.flag-btn.active { background: rgba(56,189,248,0.18); }
.flag-btn:first-child { border-radius: 100px 0 0 100px; }
.flag-btn:last-child  { border-radius: 0 100px 100px 0; }
.flag-divider { width: 1px; height: 24px; background: var(--border); }

/* ── KEYBOARD NAVIGATION ── */
.sr-item.kb-focus {
  background: rgba(56,189,248,0.14);
  border-left: 3px solid var(--accent);
  padding-left: 13px;
}

/* ── ROW HIGHLIGHT (when jumping to a parameter) ── */
@keyframes rowPulse {
  0%   { background: rgba(74,222,128,0.25); }
  60%  { background: rgba(74,222,128,0.12); }
  100% { background: transparent; }
}
.ref-row-highlight td { animation: rowPulse 1.8s ease forwards; }
.quiz-wrap { max-width: 520px; margin: 0 auto; }
.quiz-q { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:12px; }
.quiz-q-num { font-family:'Syne',sans-serif; font-size:0.65rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--accent); margin-bottom:7px; }
.quiz-q-text { font-family:'Syne',sans-serif; font-weight:700; font-size:0.95rem; line-height:1.5; }
.quiz-options { display:grid; gap:9px; margin-bottom:14px; }
.quiz-opt { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:12px 14px; font-family:Georgia,serif; font-size:0.85rem; color:var(--text); cursor:pointer; text-align:left; transition:all 0.15s; display:flex; align-items:center; gap:10px; }
.quiz-opt:hover:not(:disabled) { border-color:var(--accent); background:rgba(56,189,248,0.06); }
.quiz-opt.correct { border-color:var(--green); background:rgba(74,222,128,0.1); color:var(--green); }
.quiz-opt.wrong   { border-color:var(--red); background:rgba(248,113,113,0.1); color:var(--red); }
.quiz-opt:disabled { cursor:default; }
.opt-letter { font-family:'Syne',sans-serif; font-weight:800; font-size:0.75rem; width:22px; height:22px; border-radius:6px; background:var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--muted); }
.quiz-opt.correct .opt-letter { background:var(--green); color:#0a0f1a; }
.quiz-opt.wrong   .opt-letter { background:var(--red); color:#fff; }
.quiz-explanation { background:rgba(56,189,248,0.06); border:1px solid rgba(56,189,248,0.2); border-radius:12px; padding:12px 14px; font-size:0.8rem; color:var(--text); line-height:1.6; margin-bottom:14px; display:none; }
.quiz-explanation.show { display:block; }
.quiz-score { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:28px; text-align:center; display:none; }
.quiz-score.show { display:block; }
.score-num { font-family:'Syne',sans-serif; font-weight:800; font-size:3rem; background:linear-gradient(120deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.score-label { color:var(--muted); font-size:0.78rem; margin-top:4px; margin-bottom:20px; }
</style>
</head>
<body>

<!-- ═══ FONT CONTROLS (top-left) ═══ -->
<div class="font-controls" id="font-controls">
  <div class="font-toggle" id="font-toggle">
    <button class="font-btn active" id="font-sf"    onclick="setFont('sf')"    title="San Francisco — Apple style" style="font-family:-apple-system,sans-serif">SF</button>
    <button class="font-btn"        id="font-serif"  onclick="setFont('serif')"  title="Serif — editorial style"     style="font-family:Georgia,serif">Se</button>
    <button class="font-btn"        id="font-mono"   onclick="setFont('mono')"   title="Monospace — clinical style"  style="font-family:'DM Mono',monospace">Mo</button>
  </div>
  <div class="size-toggle">
    <button class="size-btn" onclick="adjustSize(-1)" title="Decrease font size">A−</button>
    <div class="size-label" id="size-label">16</div>
    <button class="size-btn" onclick="adjustSize(1)"  title="Increase font size">A+</button>
  </div>
</div>

<!-- ═══ FLAG TOGGLE ═══ -->
<div class="flag-toggle" id="flag-toggle">
  <button class="flag-btn active" id="flag-ca" onclick="setFlag('ca')" title="Canadian values (mmol/L)">🇨🇦</button>
  <div class="flag-divider"></div>
  <button class="flag-btn" id="flag-both" onclick="setFlag('both')" title="Show both">🇨🇦🇺🇸</button>
  <div class="flag-divider"></div>
  <button class="flag-btn" id="flag-us" onclick="setFlag('us')" title="US values (mg/dL)">🇺🇸</button>
</div>

<!-- ═══ HOME SCREEN ═══ -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <h1>Med Flash 🍁</h1>
    <p>Canadian Reference Values · Choose a category</p>
  </div>
  <div class="search-wrap">
    <div class="search-container">
      <input class="search-input" id="search-input" type="text" placeholder="Search any lab, abbreviation, or keyword…" oninput="handleSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="search-results" id="search-results"></div>
    </div>
  </div>
  <div class="category-grid" id="category-grid"></div>
</div>

<!-- ═══ STUDY SCREEN ═══ -->
<div id="screen-study" class="screen">
  <div class="study-topbar">
    <button class="back-btn" onclick="goHome()">← Categories</button>
    <div class="study-title" id="study-title">—</div>
  </div>
  <div class="mode-tabs">
    <button class="mode-btn active" onclick="showMode('ref',this)">📋 Reference</button>
    <button class="mode-btn" onclick="showMode('flash',this)">🃏 Flashcards</button>
    <button class="mode-btn" onclick="showMode('quiz',this)">🧠 Quiz</button>
  </div>

  <!-- REFERENCE -->
  <div id="mode-ref" class="mode-panel active">
    <div class="table-wrap">
      <table class="ref-table" id="ref-table">
        <thead><tr><th>Abbreviation / Test</th><th>Normal Range</th></tr></thead>
        <tbody id="ref-body"></tbody>
      </table>
    </div>
  </div>

  <!-- FLASHCARDS -->
  <div id="mode-flash" class="mode-panel">
    <div class="fc-area">
      <div class="progress-wrap"><div class="progress-fill" id="fc-progress"></div></div>
      <div class="fc-counter" id="fc-counter">Card 1 of —</div>
      <div class="fc-viewport" id="fc-viewport">
        <div class="fc-track" id="fc-track"></div>
      </div>
      <div class="swipe-hint" id="swipe-hint">← swipe · tap to flip →</div>
      <div class="fc-controls">
        <button class="fc-btn" onclick="prevCard()">← Prev</button>
        <button class="fc-btn primary" onclick="shuffleCards()">⇄ Shuffle</button>
        <button class="fc-btn" onclick="nextCard()">Next →</button>
      </div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="mode-quiz" class="mode-panel">
    <div class="quiz-wrap">
      <div id="quiz-body"></div>
      <div class="quiz-score" id="quiz-score">
        <div class="score-num" id="score-num">—</div>
        <div class="score-label" id="score-label">—</div>
        <button class="fc-btn primary" style="margin-top:8px" onclick="startQuiz()">Retake Quiz</button>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  DATABASE
//  card: { abbr, name, q, ca, us }
//    ca = 🇨🇦 Canadian value(s)
//    us = 🇺🇸 US value(s)
//    (null = same as other country / not applicable)
// ══════════════════════════════════════════════

// Helper: build the green answer HTML shown on card back + reference table
function fmtAnswer(c) {
  if (c.ca && c.us) return `🇨🇦 ${c.ca}<br>🇺🇸 ${c.us}`;
  if (c.ca) return `🇨🇦 ${c.ca}`;
  if (c.us) return `🇺🇸 ${c.us}`;
  return '—';
}

const DB = [

  // ── LIPID PROFILE ──────────────────────────
  {
    id:'lipid', icon:'🫀', name:'Lipid Profile',
    cards:[

// Levenshtein distance
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_,i) => Array.from({length: n+1}, (_,j) => i===0?j:j===0?i:0));
  for (let i=1; i<=m; i++)
    for (let j=1; j<=n; j++)
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function norm(s) { return s.toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }

// ── Tiered scorer ──────────────────────────────
// Returns { score, tier }
// tier 1 = card-specific match (abbr/name/card alias)
// tier 2 = category-level match
// Lower score = better
function scoreCard(q, card, cat) {
  const qn = norm(q);
  const abbrN  = norm(card.abbr);
  const nameN  = norm(card.name);

  // Tier 1a — exact abbreviation
  if (abbrN === qn) return { score: 0, tier: 1 };
  // Tier 1b — abbreviation starts with query
  if (abbrN.startsWith(qn)) return { score: 1, tier: 1 };
  // Tier 1c — exact full name
  if (nameN === qn) return { score: 2, tier: 1 };
  // Tier 1d — name starts with query
  if (nameN.startsWith(qn)) return { score: 3, tier: 1 };
  // Tier 1e — query is contained in name
  if (nameN.includes(qn)) return { score: 4, tier: 1 };
  // Tier 1f — card-level alias exact/prefix
  const cardAlias = CARD_ALIASES[qn];
  if (cardAlias && norm(cardAlias) === abbrN) return { score: 5, tier: 1 };

  // Tier 1g — fuzzy match on abbreviation (1 typo)
  if (levenshtein(qn, abbrN) === 1) return { score: 6, tier: 1 };

  // Tier 1h — fuzzy match on name words
  const qWords = qn.split(' ');
  const nameWords = nameN.split(' ');
  const allClose = qWords.every(qw =>
    nameWords.some(nw => nw === qw || nw.startsWith(qw) || levenshtein(qw, nw) <= 1)
  );
  if (allClose) return { score: 7, tier: 1 };

  // Tier 1i — fuzzy full name (up to 2 typos, proportional)
  const dist = levenshtein(qn, nameN);
  const ratio = dist / Math.max(qn.length, nameN.length);
  if (dist <= 2 && ratio < 0.4) return { score: 8, tier: 1 };

  // Tier 2 — category-level alias fallback (only for short queries or explicit cat searches)
  const catAliasMatch = ALIASES[qn] === cat.id;
  if (catAliasMatch) return { score: 20, tier: 2 };

  // Tier 2 — fuzzy on category alias
  const catAliasKeys = Object.keys(ALIASES).filter(k => ALIASES[k] === cat.id);
  for (const ak of catAliasKeys) {
    if (ak === qn || ak.startsWith(qn)) return { score: 25, tier: 2 };
    if (levenshtein(qn, ak) <= 1) return { score: 28, tier: 2 };
  }

  return { score: 999, tier: 3 }; // no match
}

function scoreCat(q, cat) {
  const qn = norm(q);
  const nameN = norm(cat.name);
  if (nameN === qn) return 0;
  if (nameN.startsWith(qn)) return 1;
  if (nameN.includes(qn)) return 2;
  if (ALIASES[qn] === cat.id) return 3;
  const catAliasKeys = Object.keys(ALIASES).filter(k => ALIASES[k] === cat.id);
  for (const ak of catAliasKeys) {
    if (ak === qn || ak.startsWith(qn)) return 4;
  }
  if (levenshtein(qn, nameN) <= 2) return 5;
  return 999;
}

// Build search index
function buildSearchIndex() {
  const items = [];
  DB.forEach(cat => {
    items.push({ type:'cat', cat });
    cat.cards.forEach((card, cardIdx) => {
      items.push({ type:'card', cat, card, cardIdx });
    });
  });
  return items;
}

//  FLAG MODE  ('ca' | 'us' | 'both')
// ══════════════════════════════════════════════
let flagMode = 'both';

function setFlag(mode) {
  flagMode = mode;
  ['ca','both','us'].forEach(m => {
    document.getElementById('flag-'+m).classList.toggle('active', m === mode);
  });
  // Rebuild whatever is currently visible
  if (activeCat) {
    buildRefTable();
    buildTrack();
    // re-render search results value snippets if open
    if (document.getElementById('search-results').classList.contains('open')) {
      handleSearch();
    }
  }
}

function getValHtml(card, lineBreak = true) {
  const ca = card.ca ? `🇨🇦 ${card.ca}` : '';
  const us = card.us ? `🇺🇸 ${card.us}` : '';
  const sep = lineBreak ? '<br>' : '  ';
  if (flagMode === 'ca') return ca || us;
  if (flagMode === 'us') return us || ca;
  return (ca && us) ? `${ca}${sep}${us}` : ca || us;
}

function getValText(card) {
  const ca = card.ca || '';
  const us = card.us || '';
  if (flagMode === 'ca') return ca || us;
  if (flagMode === 'us') return us || ca;
  return ca && us ? `${ca} / ${us}` : ca || us;
}

// ══════════════════════════════════════════════
let kbIndex = -1;         // -1 = nothing focused
let currentResults = [];  // flat list of result items in order

function getResultItems() {
  return Array.from(document.querySelectorAll('#search-results .sr-item'));
}

function updateKbFocus(items, newIdx) {
  items.forEach(el => el.classList.remove('kb-focus'));
  if (newIdx >= 0 && newIdx < items.length) {
    items[newIdx].classList.add('kb-focus');
    items[newIdx].scrollIntoView({ block: 'nearest' });
  }
  kbIndex = newIdx;
}

let currentFont = 'sf';
let currentFontSize = 16; // px, applied to html root so rem scales globally
const FONT_SIZE_MIN = 12;
const FONT_SIZE_MAX = 22;

function setFont(f) {
  currentFont = f;
  document.body.classList.remove('font-sf','font-serif','font-mono');
  document.body.classList.add('font-' + f);
  ['sf','serif','mono'].forEach(id => {

  });
}

function adjustSize(delta) {
  currentFontSize = Math.min(FONT_SIZE_MAX, Math.max(FONT_SIZE_MIN, currentFontSize + delta));
  document.documentElement.style.setProperty('--base-font-size', currentFontSize + 'px');
  document.documentElement.style.fontSize = currentFontSize + 'px';
  document.getElementById('size-label').textContent = currentFontSize;
}

// ══════════════════════════════════════════════
//  NAVIGATION HISTORY  (for [ and ] keys)
// ══════════════════════════════════════════════
// States: 'home' | 'study-ref' | 'study-flash' | 'study-quiz'
const navHistory = ['home'];
let navPos = 0;

function navPush(state) {
  // Trim forward history when navigating to a new state
  navHistory.splice(navPos + 1);
  navHistory.push(state);
  navPos = navHistory.length - 1;
}

function navBack() {
  if (navPos <= 0) return;
  navPos--;
  applyNavState(navHistory[navPos]);
}

function navForward() {
  if (navPos >= navHistory.length - 1) return;
  navPos++;
  applyNavState(navHistory[navPos]);
}

function applyNavState(state) {
  if (state === 'home') {
    document.getElementById('screen-home').classList.add('active');
    document.getElementById('screen-study').classList.remove('active');
    renderHome('');
  } else if (state === 'study-ref') {
    document.getElementById('screen-home').classList.remove('active');
    document.getElementById('screen-study').classList.add('active');
    if (activeCat) { showMode('ref', document.querySelectorAll('.mode-btn')[0]); buildRefTable(); }
  } else if (state === 'study-flash') {
    document.getElementById('screen-home').classList.remove('active');
    document.getElementById('screen-study').classList.add('active');
    if (activeCat) { showMode('flash', document.querySelectorAll('.mode-btn')[1]); buildTrack(); }
  } else if (state === 'study-quiz') {
    document.getElementById('screen-home').classList.remove('active');
    document.getElementById('screen-study').classList.add('active');
    if (activeCat) { showMode('quiz', document.querySelectorAll('.mode-btn')[2]); startQuiz(); }
  }
}

// ══════════════════════════════════════════════
//  MASTER KEYBOARD HANDLER
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const input  = document.getElementById('search-input');
  const isTypingInInput = document.activeElement === input;
  const isTypingAnywhere = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName);
  const resultsEl = document.getElementById('search-results');
  const isOpen = resultsEl.classList.contains('open');

  // ── [ = Back, ] = Forward ──────────────────
  if ((e.key === '[' || e.key === ']') && !isTypingAnywhere) {
    e.preventDefault();
    if (e.key === '[') navBack();
    else navForward();
    return;
  }

  // ── / = Focus search ───────────────────────
  if (e.key === '/' && !isTypingAnywhere) {
    e.preventDefault();
    focusSearch();
    return;
  }

  // ── Arrow / Enter / Escape in open results ──
  if (isOpen) {
    const items = getResultItems();
    if (items.length) {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        updateKbFocus(items, Math.min(kbIndex + 1, items.length - 1));
        return;
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        updateKbFocus(items, Math.max(kbIndex - 1, 0));
        return;
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const targetIdx = kbIndex >= 0 ? kbIndex : 0;
        if (items[targetIdx]) { items[targetIdx].click(); kbIndex = -1; }
        return;
      }
    }
    if (e.key === 'Escape') {
      resultsEl.classList.remove('open');
      input.blur();
      kbIndex = -1;
      return;
    }
  }

  // ── Auto-type: any printable key → search ──
  // Trigger if: not already in an input, not a modifier/special key
  if (!isTypingAnywhere && !e.metaKey && !e.ctrlKey && !e.altKey) {
    const printable = e.key.length === 1; // single char = printable
    if (printable) {
      e.preventDefault();
      focusSearch(e.key); // pass the pressed char as seed
    }
  }
});

function focusSearch(seedChar) {
  const input = document.getElementById('search-input');
  const homeScreen = document.getElementById('screen-home');
  const studyScreen = document.getElementById('screen-study');

  // Navigate home if on study screen so search bar is visible
  if (!homeScreen.classList.contains('active')) {
    homeScreen.classList.add('active');
    studyScreen.classList.remove('active');
    renderHome('');
  }

  input.focus();

  if (seedChar) {
    // Replace input content with the new character (fresh start)
    input.value = seedChar;
    handleSearch();
  } else {
    input.select();
    // Flash border
    input.style.borderColor = 'var(--accent2)';
    setTimeout(() => { input.style.borderColor = ''; }, 600);
  }
}

// ── Detect numeric / value query ──────────────
function isValueQuery(raw) {
  // True if the query contains a digit, OR starts with < > ≥ ≤ ~
  return /[\d]/.test(raw) || /^[<>≥≤~]/.test(raw.trim());
}

// ── Score a card's value text against a numeric query ──
// Returns { matched: bool, caHit: bool, usHit: bool, highlightedCa, highlightedUs }
function scoreValueMatch(raw, card) {
  const q = raw.trim().toLowerCase();
  // Extract just digits and dots from query for broad matching
  const digitsOnly = q.replace(/[^0-9.]/g, '');
  if (!digitsOnly) return { matched: false };

  const caText = (card.ca || '').toLowerCase();
  const usText = (card.us || '').toLowerCase();

  const caHit = caText.includes(digitsOnly) || caText.replace(/[^0-9.]/g,'').includes(digitsOnly);
  const usHit = usText.includes(digitsOnly) || usText.replace(/[^0-9.]/g,'').includes(digitsOnly);

  if (!caHit && !usHit) return { matched: false };

  // Build highlighted HTML — wrap matching digit sequence in <mark>
  function highlight(text, digits) {
    if (!text) return '';
    // Escape for HTML then highlight
    const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // Find and highlight the digit sequence
    const re = new RegExp(digits.replace(/\./g,'\\.'), 'g');
    return escaped.replace(re, m => `<span class="val-match">${m}</span>`);
  }

  const highlightedCa = caHit && card.ca ? highlight(card.ca.split('\n')[0], digitsOnly) : (card.ca ? card.ca.split('\n')[0] : '');
  const highlightedUs = usHit && card.us ? highlight(card.us.split('\n')[0], digitsOnly) : (card.us ? card.us.split('\n')[0] : '');

  // Relevance: exact digit sequence found = score 0, partial = score 1
  const score = (caText.includes(digitsOnly) || usText.includes(digitsOnly)) ? 0 : 1;

  return { matched: true, caHit, usHit, highlightedCa, highlightedUs, score };
}

let searchIndex = null;

function handleSearch() {
  const raw = document.getElementById('search-input').value.trim();
  const resultsEl = document.getElementById('search-results');
  kbIndex = -1;

  if (!searchIndex) searchIndex = buildSearchIndex();

  if (!raw) {
    resultsEl.classList.remove('open');
    return;
  }

  // ── VALUE RANGE SEARCH PATH ──────────────────
  if (isValueQuery(raw)) {
    const valueHits = [];
    for (const item of searchIndex) {
      if (item.type !== 'card') continue;
      const vm = scoreValueMatch(raw, item.card);
      if (vm.matched) valueHits.push({ ...item, vm });
    }

    // Sort by score (exact digit hit first), then by category
    valueHits.sort((a, b) => a.vm.score - b.vm.score);

    if (valueHits.length === 0) {
      resultsEl.innerHTML = `<div class="sr-empty">No values containing "<strong>${raw}</strong>" found</div>`;
      resultsEl.classList.add('open');
      return;
    }

    let html = `<div class="sr-section-label value-section">🔢 Values containing "${raw}"</div>`;
    valueHits.slice(0, 10).forEach(item => {
      const { highlightedCa, highlightedUs, caHit, usHit } = item.vm;

      // Build value display respecting flagMode
      let valDisplay = '';
      if (flagMode === 'ca') {
        valDisplay = caHit ? `🇨🇦 ${highlightedCa}` : (item.card.ca ? `🇨🇦 ${item.card.ca.split('\n')[0]}` : '');
      } else if (flagMode === 'us') {
        valDisplay = usHit ? `🇺🇸 ${highlightedUs}` : (item.card.us ? `🇺🇸 ${item.card.us.split('\n')[0]}` : '');
      } else {
        const caLine = `🇨🇦 ${highlightedCa || (item.card.ca ? item.card.ca.split('\n')[0] : '')}`;
        const usLine = `🇺🇸 ${highlightedUs || (item.card.us ? item.card.us.split('\n')[0] : '')}`;
        valDisplay = (item.card.ca && item.card.us) ? `${caLine}<br>${usLine}` : caLine || usLine;
      }

      html += `<div class="sr-item value-hit" data-catid="${item.cat.id}" data-cardidx="${item.cardIdx}" onclick="openToCard('${item.cat.id}', ${item.cardIdx})">
        <div class="sr-item-icon">${item.cat.icon}</div>
        <div class="sr-item-abbr">${item.card.abbr}</div>
        <div class="sr-item-info">
          <div class="sr-item-name">${item.card.name}</div>
          <div class="sr-item-cat">${item.cat.name}</div>
        </div>
        <div class="sr-item-val value-hit">${valDisplay}</div>
      </div>`;
    });

    resultsEl.innerHTML = html;
    resultsEl.classList.add('open');
    const items = getResultItems();
    if (items.length) updateKbFocus(items, 0);
    return;
  }

  // ── NORMAL TEXT SEARCH PATH ──────────────────
  const scored = [];
  for (const item of searchIndex) {
    if (item.type === 'card') {
      const { score, tier } = scoreCard(raw, item.card, item.cat);
      if (score < 999) scored.push({ ...item, score, tier });
    } else {
      const score = scoreCat(raw, item.cat);
      if (score < 999) scored.push({ ...item, score, tier: 3 });
    }
  }

  scored.sort((a, b) => {
    const tierA = a.type === 'card' ? a.tier : 3;
    const tierB = b.type === 'card' ? b.tier : 3;
    if (tierA !== tierB) return tierA - tierB;
    return a.score - b.score;
  });

  const seen = new Set();
  const unique = scored.filter(i => {
    const key = i.type === 'card' ? `${i.cat.id}::${i.card.abbr}` : `cat::${i.cat.id}`;
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });

  if (unique.length === 0) {
    resultsEl.innerHTML = `<div class="sr-empty">No results for "<strong>${raw}</strong>" — try the abbreviation or full name</div>`;
    resultsEl.classList.add('open');
    return;
  }

  const tier1Cards = unique.filter(i => i.type === 'card' && i.tier === 1);
  const tier2Cards = unique.filter(i => i.type === 'card' && i.tier === 2);
  const catResults = unique.filter(i => i.type === 'cat').slice(0, 3);
  const showCards = tier1Cards.length > 0 ? tier1Cards.slice(0, 8) : tier2Cards.slice(0, 6);

  let html = '';
  if (showCards.length) {
    html += `<div class="sr-section-label">↑↓ Navigate · Enter to open</div>`;
    showCards.forEach(item => {
      let valSnippet = '';
      if (flagMode === 'us') {
        valSnippet = item.card.us ? `🇺🇸 ${item.card.us.split('\n')[0]}` : (item.card.ca ? `🇨🇦 ${item.card.ca.split('\n')[0]}` : '');
      } else if (flagMode === 'ca') {
        valSnippet = item.card.ca ? `🇨🇦 ${item.card.ca.split('\n')[0]}` : (item.card.us ? `🇺🇸 ${item.card.us.split('\n')[0]}` : '');
      } else {
        const ca = item.card.ca ? `🇨🇦 ${item.card.ca.split('\n')[0]}` : '';
        const us = item.card.us ? `🇺🇸 ${item.card.us.split('\n')[0]}` : '';
        valSnippet = ca && us ? `${ca} · ${us}` : ca || us;
      }
      html += `<div class="sr-item" data-catid="${item.cat.id}" data-cardidx="${item.cardIdx}" onclick="openToCard('${item.cat.id}', ${item.cardIdx})">
        <div class="sr-item-icon">${item.cat.icon}</div>
        <div class="sr-item-abbr">${item.card.abbr}</div>
        <div class="sr-item-info">
          <div class="sr-item-name">${item.card.name}</div>
          <div class="sr-item-cat">${item.cat.name}</div>
        </div>
        <div class="sr-item-val">${valSnippet}</div>
      </div>`;
    });
  }

  const goodCats = catResults.filter(i => i.score <= 4);
  const showCats = showCards.length === 0 ? catResults : goodCats;
  if (showCats.length) {
    html += `<div class="sr-section-label">Categories</div>`;
    showCats.forEach(item => {
      html += `<div class="sr-item" data-catid="${item.cat.id}" data-cardidx="-1" onclick="openCategory(DB.find(c=>c.id==='${item.cat.id}'))">
        <div class="sr-item-icon">${item.cat.icon}</div>
        <div class="sr-item-abbr" style="font-size:0.75rem">${item.cat.name}</div>
        <div class="sr-item-info"><div class="sr-item-cat">${item.cat.cards.length} cards</div></div>
      </div>`;
    });
  }

  resultsEl.innerHTML = html;
  resultsEl.classList.add('open');
  const items = getResultItems();
  if (items.length) updateKbFocus(items, 0);
}

// Open a specific category AND highlight a specific card/row
function openToCard(catId, cardIdx) {
  const cat = DB.find(c => c.id === catId);
  if (!cat) return;
  document.getElementById('search-results').classList.remove('open');
  document.getElementById('search-input').value = '';
  kbIndex = -1;

  // Open the category in reference mode first (shows the highlighted row)
  activeCat = cat;
  fcIndex = cardIdx >= 0 ? cardIdx : 0;
  fcOrder = [...Array(cat.cards.length).keys()];
  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-study').classList.add('active');
  document.getElementById('study-title').textContent = cat.icon + ' ' + cat.name;

  // Switch to reference tab
  showMode('ref', document.querySelectorAll('.mode-btn')[0]);
  buildRefTable(cardIdx); // pass the row to highlight
  buildTrack();
  navPush('study-ref');
}

// Close results when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.search-container')) {
    document.getElementById('search-results').classList.remove('open');
  }
});

function renderHome(highlightQuery) {
  const grid = document.getElementById('category-grid');
  grid.innerHTML = '';
  DB.forEach((cat, i) => {
    const div = document.createElement('div');
    div.className = 'cat-card';
    div.style.animationDelay = `${i * 0.04}s`;
    div.innerHTML = `<div class="cat-icon">${cat.icon}</div><div class="cat-name">${cat.name}</div><div class="cat-count">${cat.cards.length} cards</div>`;
    div.onclick = () => {
      document.getElementById('search-results').classList.remove('open');
      openCategory(cat);
    };
    grid.appendChild(div);
  });
}

function goHome() {
  document.getElementById('screen-home').classList.add('active');
  document.getElementById('screen-study').classList.remove('active');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').classList.remove('open');
  renderHome('');
  navPush('home');
}

// ── OPEN CATEGORY ─────────────────────────────
function openCategory(cat) {
  activeCat = cat;
  fcIndex = 0;
  fcOrder = [...Array(cat.cards.length).keys()];
  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-study').classList.add('active');
  document.getElementById('study-title').textContent = cat.icon + ' ' + cat.name;
  showMode('ref', document.querySelector('.mode-btn'));
  buildRefTable();
  buildTrack();
  navPush('study-ref');
}

// ── MODE TABS ─────────────────────────────────
function showMode(id, btn) {
  document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'quiz') startQuiz();
  if (id === 'flash') { buildTrack(); }
  if (id === 'ref') { buildRefTable(); }
  navPush('study-' + id);
}

// ── REFERENCE TABLE ───────────────────────────
function buildRefTable(highlightIdx = -1) {
  const tbody = document.getElementById('ref-body');
  tbody.innerHTML = '';
  activeCat.cards.forEach((c, idx) => {
    const tr = document.createElement('tr');
    tr.dataset.idx = idx;
    if (idx === highlightIdx) tr.classList.add('ref-row-highlight');
    tr.innerHTML = `
      <td><div class="ref-abbr">${c.abbr}</div><div class="ref-name">${c.name}</div></td>
      <td class="ref-val">${getValHtml(c, true)}</td>`;
    tbody.appendChild(tr);
  });

  // Scroll highlighted row into view after a tick
  if (highlightIdx >= 0) {
    setTimeout(() => {
      const row = tbody.querySelector(`tr[data-idx="${highlightIdx}"]`);
      if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 120);
  }
}

// ── FLASHCARD TRACK ───────────────────────────
function buildTrack() {
  const track = document.getElementById('fc-track');
  track.innerHTML = '';
  fcOrder.forEach((cardIdx, i) => {
    const c = activeCat.cards[cardIdx];
    const slide = document.createElement('div');
    slide.className = 'fc-slide';
    slide.innerHTML = `
      <div class="flipper" id="flipper-${i}">
        <div class="card-face card-front">
          <div class="card-abbr">${c.abbr}</div>
          <div class="card-question">${c.q}</div>
          <div class="card-hint">Tap to reveal normal value</div>
        </div>
        <div class="card-face card-back">
          <div class="card-answer">${getValHtml(c, true)}</div>
        </div>
      </div>`;
    track.appendChild(slide);
  });
  positionTrack(false);
  document.getElementById('swipe-hint').classList.remove('hidden');
}

function positionTrack(animate) {
  const track = document.getElementById('fc-track');
  track.style.transition = animate ? 'transform 0.35s cubic-bezier(0.4,0,0.2,1)' : 'none';
  track.style.transform = `translateX(-${fcIndex * 100}%)`;
  const flipper = document.getElementById(`flipper-${fcIndex}`);
  if (flipper) flipper.classList.remove('flipped');
  const total = activeCat ? activeCat.cards.length : 1;
  document.getElementById('fc-progress').style.width = `${((fcIndex + 1) / total) * 100}%`;
  document.getElementById('fc-counter').textContent = `Card ${fcIndex + 1} of ${total}`;
}

function nextCard() { if (fcIndex < activeCat.cards.length - 1) { fcIndex++; positionTrack(true); } }
function prevCard() { if (fcIndex > 0) { fcIndex--; positionTrack(true); } }
function shuffleCards() {
  for (let i = fcOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcOrder[i], fcOrder[j]] = [fcOrder[j], fcOrder[i]];
  }
  fcIndex = 0; buildTrack();
}

// ── SWIPE ─────────────────────────────────────
function initSwipe() {
  const viewport = document.getElementById('fc-viewport');
  let startX = 0, startY = 0, isDragging = false, isHorizontal = null;
  swipeMovedX = 0;

  function onStart(x, y) {
    startX = x; startY = y; isDragging = true; swipeMovedX = 0; isHorizontal = null;
    const track = document.getElementById('fc-track');
    if (track) track.style.transition = 'none';
  }
  function onMove(x, y) {
    if (!isDragging) return;
    const dx = x - startX, dy = y - startY;
    if (isHorizontal === null && (Math.abs(dx) > 5 || Math.abs(dy) > 5))
      isHorizontal = Math.abs(dx) > Math.abs(dy);
    if (!isHorizontal) return;
    swipeMovedX = dx;
    const track = document.getElementById('fc-track');
    if (track) track.style.transform = `translateX(calc(-${fcIndex * 100}% + ${swipeMovedX}px))`;
  }
  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    if (!isHorizontal || !activeCat) return;
    const threshold = viewport.offsetWidth * 0.25;
    if (swipeMovedX < -threshold && fcIndex < activeCat.cards.length - 1) fcIndex++;
    else if (swipeMovedX > threshold && fcIndex > 0) fcIndex--;
    positionTrack(true);
    document.getElementById('swipe-hint').classList.add('hidden');
  }

  viewport.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  viewport.addEventListener('touchmove',  e => onMove(e.touches[0].clientX, e.touches[0].clientY),  { passive: true });
  viewport.addEventListener('touchend', onEnd);
  viewport.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => { if (isDragging) onMove(e.clientX, e.clientY); });
  window.addEventListener('mouseup', onEnd);

  viewport.addEventListener('click', e => {
    if (Math.abs(swipeMovedX) > 8) return;
    const slide = e.target.closest('.fc-slide');
    if (!slide) return;
    const flipper = slide.querySelector('.flipper');
    if (flipper) flipper.classList.toggle('flipped');
  });
}

// ── QUIZ ──────────────────────────────────────
function startQuiz() {
  if (!activeCat) return;
  quizAnswered = new Array(activeCat.quiz.length).fill(null);
  quizScore = 0;
  document.getElementById('quiz-score').classList.remove('show');
  renderQuiz();
}

function renderQuiz() {
  const area = document.getElementById('quiz-body');
  area.innerHTML = '';
  const letters = ['A','B','C','D'];
  activeCat.quiz.forEach((q, qi) => {
    const answered = quizAnswered[qi];
    const div = document.createElement('div');
    div.innerHTML = `
      <div class="quiz-q">
        <div class="quiz-q-num">Question ${qi+1} of ${activeCat.quiz.length}</div>
        <div class="quiz-q-text">${q.q}</div>
      </div>
      <div class="quiz-options">
        ${q.opts.map((opt,oi) => `
          <button class="quiz-opt ${answered!==null?(oi===q.ans?'correct':(oi===answered?'wrong':'')):''}
            " onclick="answerQuiz(${qi},${oi})" ${answered!==null?'disabled':''}>
            <span class="opt-letter">${letters[oi]}</span>${opt}
          </button>`).join('')}
      </div>
      <div class="quiz-explanation ${answered!==null?'show':''}">💡 ${q.exp}</div>`;
    area.appendChild(div);
  });
}

function answerQuiz(qi, oi) {
  if (quizAnswered[qi] !== null) return;
  quizAnswered[qi] = oi;
  if (oi === activeCat.quiz[qi].ans) quizScore++;
  renderQuiz();
  if (quizAnswered.every(a => a !== null)) setTimeout(showScore, 500);
}

function showScore() {
  const el = document.getElementById('quiz-score');
  const pct = Math.round((quizScore / activeCat.quiz.length) * 100);
  const msg = pct===100?'🏆 Perfect!':pct>=75?'🎉 Great job!':pct>=50?'📚 Keep studying!':'💪 Review the reference first!';
  document.getElementById('score-num').textContent = `${quizScore}/${activeCat.quiz.length}`;
  document.getElementById('score-label').textContent = `${pct}% — ${msg}`;
  el.classList.add('show');
  el.scrollIntoView({ behavior:'smooth', block:'center' });
}

// ── INIT ──────────────────────────────────────
renderHome('');
initSwipe();
</script>
