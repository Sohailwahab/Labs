<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Med Flash — Canadian Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f1a;
  --surface: #111827;
  --card: #1a2235;
  --border: #2a3a55;
  --accent: #38bdf8;
  --accent2: #f472b6;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --text: #e2e8f0;
  --muted: #64748b;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: Georgia, serif;
  min-height: 100vh;
  padding: 0 0 80px;
}

/* ══════════════════════════════════════════
   PLATFORM-AWARE SEARCH
   body gets class: platform-ios | platform-ipados | platform-macos
   ══════════════════════════════════════════ */

/* ── iPadOS: sticky search bar always visible at top ── */
.ipad-search-bar {
  display: none;
  position: sticky; top: 0; z-index: 150;
  background: var(--bg);
  padding: 10px 16px 8px;
  border-bottom: 1px solid var(--border);
}
.platform-ipados .ipad-search-bar { display: block; }
.platform-ipados .ipad-search-bar .search-container { max-width: 620px; margin: 0 auto; }

/* iPadOS: hide the in-page search wrap on home (ipad bar handles it) */
.platform-ipados .search-wrap { display: none; }

/* ── iOS: hide in-page search bar, show FAB instead ── */
.platform-ios .search-wrap { display: none; }

/* iOS search overlay — full screen modal */
.ios-search-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 400;
  background: rgba(10,15,26,0.96);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  flex-direction: column;
  padding: env(safe-area-inset-top, 20px) 20px 20px;
  padding-top: max(env(safe-area-inset-top, 20px), 20px);
}
.ios-search-overlay.open { display: flex; }
.ios-overlay-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.ios-overlay-input {
  flex: 1; background: var(--surface); border: 1.5px solid var(--accent);
  border-radius: 14px; padding: 13px 18px 13px 44px; color: var(--text);
  font-size: 1rem; outline: none; position: relative;
}
.ios-overlay-wrap {
  position: relative; flex: 1;
}
.ios-overlay-wrap::before {
  content: '🔍';
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 0.95rem; pointer-events: none; z-index: 1;
}
.ios-cancel-btn {
  background: none; border: none; color: var(--accent);
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  white-space: nowrap; padding: 4px 0;
  -webkit-tap-highlight-color: transparent;
}
.ios-overlay-results {
  flex: 1; overflow-y: auto; border-radius: 14px;
  background: var(--surface); border: 1px solid var(--border);
  -webkit-overflow-scrolling: touch;
}

/* ── iPadOS Apple Pencil hover search bubble ── */
.pencil-bubble {
  display: none;
  position: fixed; z-index: 600;
  background: var(--surface);
  border: 1.5px solid var(--accent);
  border-radius: 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 0 0 1px rgba(56,189,248,0.15);
  padding: 10px 14px;
  min-width: 280px; max-width: 340px;
  pointer-events: none;          /* invisible until Pencil hovers */
  opacity: 0;
  transform: translateY(6px) scale(0.97);
  transition: opacity 0.18s ease, transform 0.18s ease;
}
.pencil-bubble.visible {
  pointer-events: auto;
  opacity: 1;
  transform: translateY(0) scale(1);
}
.pencil-bubble-inner {
  position: relative;
}
.pencil-bubble-inner::before {
  content: '✏️';
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 0.85rem; pointer-events: none;
}
.pencil-bubble-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 9px 12px 9px 34px;
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
  caret-color: var(--accent);
}
.pencil-bubble-input:focus { border-color: var(--accent); }
.pencil-bubble-hint {
  font-size: 0.65rem;
  color: var(--muted);
  text-align: center;
  margin-top: 6px;
}
.pencil-bubble-results {
  max-height: 240px;
  overflow-y: auto;
  margin-top: 6px;
  border-radius: 10px;
  background: var(--card);
  border: 1px solid var(--border);
}
.platform-ipados .pencil-bubble { display: block; }
.platform-macos .search-wrap { display: none; }
.mac-search-hint {
  display: none;
  text-align: center; margin-bottom: 18px;
}
.platform-macos .mac-search-hint { display: block; }
.mac-search-hint button {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 14px; color: var(--muted);
  font-size: 0.78rem; cursor: pointer; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.mac-search-hint button:hover { border-color: var(--accent); color: var(--text); }
.mac-search-hint kbd {
  background: var(--border); border-radius: 4px;
  padding: 1px 6px; font-size: 0.72rem; font-weight: 700;
  color: var(--text); font-family: inherit;
}

/* macOS: invisible but functional search container (used by keyboard) */
.mac-hidden-search {
  position: fixed; top: -200px; left: 0; right: 0;
  display: flex; justify-content: center; z-index: 500;
  transition: top 0.25s cubic-bezier(0.4,0,0.2,1);
}
.mac-hidden-search.mac-open {
  top: 12px;
}
.mac-hidden-search .search-container {
  width: min(560px, calc(100vw - 40px));
  box-shadow: 0 8px 40px rgba(0,0,0,0.7);
}
.platform-macos .mac-hidden-search { display: flex; }
.screen { display: none; padding: 24px 16px; }
.screen.active { display: block; }

/* ── HOME ── */
.home-header { text-align: center; padding: 32px 16px 20px; }
.home-header h1 {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: clamp(1.8rem, 6vw, 2.6rem); letter-spacing: -1px;
  background: linear-gradient(120deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.home-header p { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }

.search-wrap { max-width: 500px; margin: 0 auto 20px; padding: 0 16px; }
.search-container { position: relative; }
.search-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; padding: 12px 20px 12px 44px; color: var(--text);
  font-family: Georgia, serif; font-size: 0.9rem; outline: none;
  transition: border-color 0.2s, border-radius 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }
.search-container::before {
  content: '🔍';
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  font-size: 0.9rem; pointer-events: none; z-index: 1;
}
.search-container::after {
  content: '/';
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700;
  color: var(--muted); background: var(--border);
  padding: 2px 7px; border-radius: 5px; pointer-events: none;
  letter-spacing: 0; line-height: 1.6;
  transition: opacity 0.2s;
}
.search-container:focus-within::after { opacity: 0; }
.search-results {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 100; display: none;
  max-height: 360px; overflow-y: auto;
}
.search-results.open { display: block; }
.sr-section-label {
  font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--muted); padding: 10px 16px 4px;
}
.sr-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; cursor: pointer;
  transition: background 0.15s; border-bottom: 1px solid rgba(42,58,85,0.4);
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover { background: rgba(56,189,248,0.08); }
.sr-item-icon { font-size: 1.1rem; flex-shrink: 0; }
.sr-item-abbr {
  font-weight: 800;
  font-size: 0.88rem; color: var(--accent); min-width: 60px;
}
.sr-item-info { flex: 1; min-width: 0; }
.sr-item-name { font-size: 0.82rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sr-item-alt { font-size: 0.65rem; color: var(--muted); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sr-item-cat { font-size: 0.68rem; color: var(--muted); }
.sr-item-val { font-weight: 700; font-size: 0.75rem; color: var(--green); text-align: right; white-space: nowrap; }
.sr-empty { padding: 16px; text-align: center; color: var(--muted); font-size: 0.82rem; }
.cat-name {
  font-weight: 700;
  font-size: 0.82rem; color: var(--text); line-height: 1.3;
}
.back-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); font-weight: 700;
  font-size: 0.78rem; padding: 8px 16px; border-radius: 100px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }
.study-title {
  font-weight: 800;
  font-size: 1.1rem; flex: 1;
}
.mode-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted);
  font-size: 0.78rem; font-weight: 600; padding: 8px 18px;
  border-radius: 100px; cursor: pointer; transition: all 0.2s;
}
.mode-btn:hover { color: var(--text); border-color: var(--accent); }
.mode-btn.active {
  background: linear-gradient(120deg, var(--accent), #6366f1);
  border-color: transparent; color: #fff;
}
.ref-table th {
  font-weight: 700; font-size: 0.7rem;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
  padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border);
}
.ref-abbr {
  font-weight: 800;
  font-size: 0.9rem; color: var(--accent);
}
.ref-name { color: var(--text); font-size: 0.82rem; }
.ref-alt { color: var(--muted); font-size: 0.7rem; font-style: italic; margin-top: 2px; }
.ref-val { color: var(--green); font-weight: 700; }

.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px; max-width: 620px; margin: 0 auto; padding: 0 16px;
}
.cat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 14px;
  cursor: pointer; text-align: center;
  transition: border-color 0.2s, transform 0.15s, background 0.2s;
  animation: fadeUp 0.3s ease both;
}
.cat-card:hover { border-color: var(--accent); transform: translateY(-3px); background: #1f2e45; }
.cat-icon { font-size: 1.8rem; margin-bottom: 8px; }
.cat-count { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.study-topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 16px 0; max-width: 560px; margin: 0 auto;
}
.mode-tabs { display: flex; gap: 6px; justify-content: center; margin: 16px 16px 20px; flex-wrap: wrap; }
.mode-panel { display: none; padding: 0 16px; }
.mode-panel.active { display: block; }
.ref-table { width: 100%; max-width: 560px; margin: 0 auto; border-collapse: collapse; }
.ref-table td {
  padding: 12px 14px; font-size: 0.88rem; line-height: 1.5;
  border-bottom: 1px solid rgba(42,58,85,0.5); vertical-align: middle;
}
.ref-table tr:last-child td { border-bottom: none; }
.ref-table tr:hover td { background: rgba(56,189,248,0.04); }
.table-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  max-width: 560px; margin: 0 auto;
}

/* ── FLASHCARDS ── */
.fc-area { display: flex; flex-direction: column; align-items: center; gap: 14px; max-width: 500px; margin: 0 auto; }
.progress-wrap { width: 100%; background: var(--surface); border-radius: 100px; height: 5px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:100px; transition:width 0.35s ease; }
.fc-counter { color: var(--muted); font-size: 0.78rem; }

.fc-viewport { width: 100%; overflow: hidden; border-radius: var(--radius); touch-action: pan-y; }
.fc-track { display: flex; will-change: transform; }
.fc-slide { flex: 0 0 100%; width: 100%; height: 290px; perspective: 1200px; cursor: pointer; user-select: none; -webkit-user-select: none; }
.flipper { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.45s cubic-bezier(0.4,0,0.2,1); border-radius:var(--radius); }
.flipper.flipped { transform: rotateY(180deg); }
.card-face { position:absolute; inset:0; border-radius:var(--radius); backface-visibility:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px 30px; text-align:center; }
.card-front { background:var(--card); border:1px solid var(--border); }
.card-back { background:linear-gradient(135deg,#0d1f17,#132d1e); border:2px solid var(--green); transform:rotateY(180deg); }
.card-abbr {
  /* Inherit the selected body font — only keep size and colour */
  font-weight: 700;
  font-size: clamp(2rem, 9vw, 3.2rem);
  letter-spacing: normal;
  color: var(--accent);
  line-height: 1.1;
  margin-bottom: 16px;
}
.card-question {
  /* Inherit body font — standard weight, relaxed spacing */
  font-weight: 400;
  font-size: 1rem;
  line-height: 1.7;
  color: var(--text);
  letter-spacing: normal;
}
.card-hint { color:var(--muted); font-size:0.72rem; margin-top:12px; }
.card-answer { font-weight:800; font-size:clamp(1.4rem,5.5vw,2rem); line-height:1.55; color:var(--green); text-shadow:0 0 28px rgba(74,222,128,0.35); letter-spacing:normal; }

.swipe-hint { color:var(--muted); font-size:0.7rem; letter-spacing:0.03em; transition:opacity 0.5s; }
.swipe-hint.hidden { opacity:0; }
.fc-controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.fc-btn { font-weight:700; font-size:0.8rem; padding:10px 20px; border-radius:100px; border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; transition:all 0.18s; }
.fc-btn:hover { border-color:var(--accent); color:var(--accent); }
.fc-btn.primary { background:linear-gradient(120deg,var(--accent),#6366f1); border-color:transparent; color:#fff; }
.fc-btn.primary:hover { opacity:0.9; }

/* ══════════════════════════════════════════
   BOTTOM BAR — fixed at bottom, always visible
   Contains: font controls + flag toggle (top strip)
   + icon tab bar (bottom strip)
   ══════════════════════════════════════════ */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
}

/* ── Top strip: font + flag controls ── */
.controls-strip {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px 6px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.controls-strip-left  { display: flex; align-items: center; gap: 8px; }
.controls-strip-right { display: flex; align-items: center; gap: 0; }

/* font style pills */
.font-toggle {
  display: flex; align-items: center;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 100px; overflow: hidden;
}
.font-btn {
  background: none; border: none; cursor: pointer;
  font-size: 0.7rem; padding: 5px 10px;
  transition: background 0.15s; line-height: 1;
  color: var(--muted); font-weight: 600;
  white-space: nowrap;
}
.font-btn.active { background: rgba(56,189,248,0.2); color: var(--text); }
.font-toggle .font-btn:first-child { border-radius: 100px 0 0 100px; }
.font-toggle .font-btn:last-child  { border-radius: 0 100px 100px 0; }

/* size adjuster */
.size-toggle {
  display: flex; align-items: center;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 100px; overflow: hidden;
}
.size-btn {
  background: none; border: none; cursor: pointer;
  padding: 5px 10px; color: var(--muted);
  font-weight: 700; line-height: 1; transition: background 0.15s;
  white-space: nowrap;
}
.size-btn:hover { background: rgba(56,189,248,0.1); color: var(--text); }
.size-btn:first-child { border-radius: 100px 0 0 100px; font-size: 0.62rem; }
.size-btn:last-child  { border-radius: 0 100px 100px 0; font-size: 0.82rem; }
.size-label {
  font-size: 0.6rem; font-weight: 700;
  color: var(--muted); padding: 0 5px;
  border-left: 1px solid var(--border); border-right: 1px solid var(--border);
  line-height: 26px; min-width: 28px; text-align: center;
}

/* flag toggle */
.flag-toggle {
  display: flex; align-items: center;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 100px; overflow: hidden;
}
.flag-btn {
  background: none; border: none; cursor: pointer;
  font-size: 1.05rem; padding: 5px 8px;
  transition: background 0.15s; line-height: 1;
}
.flag-btn.active { background: rgba(56,189,248,0.2); }
.flag-btn:first-child { border-radius: 100px 0 0 100px; }
.flag-btn:last-child  { border-radius: 0 100px 100px 0; }
.flag-divider { width: 1px; height: 20px; background: var(--border); }

/* ── Bottom strip: icon tab bar — REMOVED, replaced by unified bar ── */

/* ══════════════════════════════════════════
   UNIFIED BOTTOM BAR
   Row 1 (top):    Mode pills — ref/flash/quiz (study only)
   Row 2 (middle): Nav — categories (left) · title · search (right)
   Row 3 (bottom): Controls — font + size + flag
   ══════════════════════════════════════════ */

/* Body padding = height of the bar.
   Controls row ~46px + nav row ~52px + mode row ~46px = ~144px
   Mode row only shows in study, but we pad for it always so
   content never jumps. */
body { padding-bottom: calc(148px + env(safe-area-inset-bottom, 0px)); }

/* Size adjuster label font */
html { font-size: var(--base-font-size, 16px); }
body.font-sf    { font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif; }
body.font-serif { font-family: Georgia, 'Times New Roman', serif; }
body.font-mono  { font-family: 'DM Mono', 'Courier New', monospace; }

/* ── Mode row: Reference / Flashcards / Quiz ── */
.mode-bar {
  display: none;
  justify-content: center;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.mode-bar.visible { display: flex; }
.mode-pill {
  flex: 1; max-width: 120px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 100px; padding: 8px 6px;
  font-size: 0.7rem; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: all 0.18s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.mode-pill:hover { border-color: var(--accent); color: var(--text); }
.mode-pill.active {
  background: linear-gradient(120deg, var(--accent), #6366f1);
  border-color: transparent; color: #fff;
}
.mode-pill svg {
  width: 13px; height: 13px; flex-shrink: 0;
  fill: none; stroke: currentColor;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}

/* ── Nav row: categories · [title] · search ── */
.nav-row {
  display: flex; align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
  background: var(--surface);
}
.nav-btn {
  width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
  border: 1px solid var(--border); background: var(--card);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn:hover { border-color: var(--accent); background: rgba(56,189,248,0.08); }
.nav-btn:active { transform: scale(0.92); }
.nav-btn svg {
  width: 18px; height: 18px;
  fill: none; stroke: var(--text);
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}
.nav-btn.nav-search svg { stroke: var(--accent2); }
.nav-btn.nav-categories svg { stroke: var(--accent); }
.nav-title {
  flex: 1; text-align: center;
  font-size: 0.72rem; font-weight: 600;
  color: var(--muted); overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
/* Remove old FAB styles (no longer needed) */
.fab, .fab-categories, .fab-search { display: none !important; }

/* ── KEYBOARD NAVIGATION ── */
.sr-item.kb-focus {
  background: rgba(56,189,248,0.14);
  border-left: 3px solid var(--accent);
  padding-left: 13px;
}

/* ── ROW HIGHLIGHT (when jumping to a parameter) ── */
@keyframes rowPulse {
  0%   { background: rgba(74,222,128,0.25); }
  60%  { background: rgba(74,222,128,0.12); }
  100% { background: transparent; }
}
.ref-row-highlight td { animation: rowPulse 1.8s ease forwards; }
.quiz-wrap { max-width: 520px; margin: 0 auto; }
.quiz-q { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:12px; }
.quiz-q-num { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--accent); margin-bottom:7px; }
.quiz-q-text { font-weight:700; font-size:0.95rem; line-height:1.5; }
.quiz-options { display:grid; gap:9px; margin-bottom:14px; }
.quiz-opt { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:12px 14px; font-size:0.85rem; color:var(--text); cursor:pointer; text-align:left; transition:all 0.15s; display:flex; align-items:center; gap:10px; }
.quiz-opt:hover:not(:disabled) { border-color:var(--accent); background:rgba(56,189,248,0.06); }
.quiz-opt.correct { border-color:var(--green); background:rgba(74,222,128,0.1); color:var(--green); }
.quiz-opt.wrong   { border-color:var(--red); background:rgba(248,113,113,0.1); color:var(--red); }
.quiz-opt:disabled { cursor:default; }
.opt-letter { font-weight:800; font-size:0.75rem; width:22px; height:22px; border-radius:6px; background:var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--muted); }
.quiz-opt.correct .opt-letter { background:var(--green); color:#0a0f1a; }
.quiz-opt.wrong   .opt-letter { background:var(--red); color:#fff; }
.quiz-explanation { background:rgba(56,189,248,0.06); border:1px solid rgba(56,189,248,0.2); border-radius:12px; padding:12px 14px; font-size:0.8rem; color:var(--text); line-height:1.6; margin-bottom:14px; display:none; }
.quiz-explanation.show { display:block; }
.quiz-score { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:28px; text-align:center; display:none; }
.quiz-score.show { display:block; }
.score-num { font-weight:800; font-size:3rem; background:linear-gradient(120deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.score-label { color:var(--muted); font-size:0.78rem; margin-top:4px; margin-bottom:20px; }
</style>
</head>

<script>
// ══════════════════════════════════════════════

//    us = 🇺🇸 US value(s)

// Helper: build the green answer HTML shown on card back + reference table
function fmtAnswer(c) {
  if (c.ca && c.us) return `🇨🇦 ${c.ca}<br>🇺🇸 ${c.us}`;
  if (c.ca) return `🇨🇦 ${c.ca}`;
  if (c.us) return `🇺🇸 ${c.us}`;
  return '—';
}

const DB = [

  // ── LIPID PROFILE ──────────────────────────

      { abbr:'TG',        name:'Triglycerides',             alt:'Triacylglycerol · Serum TG · Trigs · Fasting Lipids',                 q:'What is the normal Triglycerides level?',      ca:'< 1.7 mmol/L',          us:'< 150 mg/dL' },

    quiz:[
      { q:'Normal Total Cholesterol?', opts:['< 6.2 mmol/L / < 240 mg/dL','< 5.2 mmol/L / < 200 mg/dL','< 4.0 mmol/L / < 155 mg/dL','< 7.0 mmol/L / < 270 mg/dL'], ans:1, exp:'🇨🇦 < 5.2 mmol/L · 🇺🇸 < 200 mg/dL. Borderline high: 5.2–6.1 mmol/L / 200–239 mg/dL.' },

// Levenshtein distance
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_,i) => Array.from({length: n+1}, (_,j) => i===0?j:j===0?i:0));
  for (let i=1; i<=m; i++)
    for (let j=1; j<=n; j++)
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function norm(s) { return s.toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }

// ── Tiered scorer ──────────────────────────────
// Returns { score, tier }
// tier 1 = card-specific match (abbr/name/card alias)
// tier 2 = category-level match
// Lower score = better
function scoreCard(q, card, cat) {
  const qn = norm(q);
  const abbrN  = norm(card.abbr);
  const nameN  = norm(card.name);
  const altTerms = card.alt ? card.alt.split(' · ').map(a => norm(a)) : [];

  // Tier 1a — exact abbreviation
  if (abbrN === qn) return { score: 0, tier: 1 };
  // Tier 1b — abbreviation starts with query
  if (abbrN.startsWith(qn)) return { score: 1, tier: 1 };
  // Tier 1c — exact full name
  if (nameN === qn) return { score: 2, tier: 1 };
  // Tier 1d — name starts with query
  if (nameN.startsWith(qn)) return { score: 3, tier: 1 };
  // Tier 1e — query is contained in name
  if (nameN.includes(qn)) return { score: 4, tier: 1 };
  // Tier 1f — card-level alias exact match
  const cardAlias = CARD_ALIASES[qn];
  if (cardAlias && norm(cardAlias) === abbrN) return { score: 5, tier: 1 };
  // Tier 1g — alt name exact or prefix match
  for (const alt of altTerms) {
    if (alt === qn) return { score: 5, tier: 1 };
    if (alt.startsWith(qn)) return { score: 6, tier: 1 };
    if (alt.includes(qn)) return { score: 6, tier: 1 };
  }
  // Tier 1h — fuzzy match on abbreviation (1 typo)
  if (levenshtein(qn, abbrN) === 1) return { score: 7, tier: 1 };
  // Tier 1i — fuzzy match on name words
  const qWords = qn.split(' ');
  const nameWords = nameN.split(' ');
  const allClose = qWords.every(qw =>
    nameWords.some(nw => nw === qw || nw.startsWith(qw) || levenshtein(qw, nw) <= 1)
  );
  if (allClose) return { score: 8, tier: 1 };
  // Tier 1j — fuzzy match on alt terms
  for (const alt of altTerms) {
    const altWords = alt.split(' ');
    const altClose = qWords.every(qw =>
      altWords.some(aw => aw === qw || aw.startsWith(qw) || levenshtein(qw, aw) <= 1)
    );
    if (altClose) return { score: 9, tier: 1 };
  }
  // Tier 1k — fuzzy full name
  const dist = levenshtein(qn, nameN);
  const ratio = dist / Math.max(qn.length, nameN.length);
  if (dist <= 2 && ratio < 0.4) return { score: 9, tier: 1 };

  // Tier 2 — category-level alias fallback
  const catAliasMatch = ALIASES[qn] === cat.id;
  if (catAliasMatch) return { score: 20, tier: 2 };
  const catAliasKeys = Object.keys(ALIASES).filter(k => ALIASES[k] === cat.id);
  for (const ak of catAliasKeys) {
    if (ak === qn || ak.startsWith(qn)) return { score: 25, tier: 2 };
    if (levenshtein(qn, ak) <= 1) return { score: 28, tier: 2 };
  }

  return { score: 999, tier: 3 };
}

function scoreCat(q, cat) {
  const qn = norm(q);
  const nameN = norm(cat.name);
  if (nameN === qn) return 0;
  if (nameN.startsWith(qn)) return 1;
  if (nameN.includes(qn)) return 2;
  if (ALIASES[qn] === cat.id) return 3;
  const catAliasKeys = Object.keys(ALIASES).filter(k => ALIASES[k] === cat.id);
  for (const ak of catAliasKeys) {
    if (ak === qn || ak.startsWith(qn)) return 4;
  }
  if (levenshtein(qn, nameN) <= 2) return 5;
  return 999;
}

// Build search index
function buildSearchIndex() {
  const items = [];
  DB.forEach(cat => {
    items.push({ type:'cat', cat });
    cat.cards.forEach((card, cardIdx) => {
      items.push({ type:'card', cat, card, cardIdx });
    });
  });
  return items;
}

//  FLAG MODE  ('ca' | 'us' | 'both')
// ══════════════════════════════════════════════
let flagMode = 'both';

function setFlag(mode) {
  flagMode = mode;
  ['ca','both','us'].forEach(m => {
    document.getElementById('flag-'+m).classList.toggle('active', m === mode);
  });
  // Rebuild whatever is currently visible
  if (activeCat) {
    buildRefTable();
    buildTrack();
    // re-render search results value snippets if open
    if (document.getElementById('search-results').classList.contains('open')) {
      handleSearch();
    }
  }
}

function getValHtml(card, lineBreak = true) {
  const ca = card.ca || '';
  const us = card.us || '';
  // Normalize for comparison: strip spaces, symbols
  const norm = s => s.replace(/\s+/g,'').toLowerCase();
  const same = ca && us && norm(ca) === norm(us);

  if (flagMode === 'ca') return ca ? `🇨🇦 ${ca}` : (us ? `🇺🇸 ${us}` : '');
  if (flagMode === 'us') return us ? `🇺🇸 ${us}` : (ca ? `🇨🇦 ${ca}` : '');

  // Both mode
  if (!ca && !us) return '';
  if (!ca) return `🇺🇸 ${us}`;
  if (!us) return `🇨🇦 ${ca}`;
  if (same) return `🇨🇦 ${ca}<br><span style="color:var(--muted);font-size:0.85em">🇺🇸 Same</span>`;
  const sep = lineBreak ? '<br>' : '  ';
  return `🇨🇦 ${ca}${sep}🇺🇸 ${us}`;
}

function getValText(card) {
  const ca = card.ca || '';
  const us = card.us || '';
  if (flagMode === 'ca') return ca || us;
  if (flagMode === 'us') return us || ca;
  return ca && us ? `${ca} / ${us}` : ca || us;
}

let currentResults = [];  // flat list of result items in order

function getResultItems() {
  return Array.from(document.querySelectorAll('#search-results .sr-item'));
}

function updateKbFocus(items, newIdx) {
  items.forEach(el => el.classList.remove('kb-focus'));
  if (newIdx >= 0 && newIdx < items.length) {
    items[newIdx].classList.add('kb-focus');
    items[newIdx].scrollIntoView({ block: 'nearest' });
  }
  kbIndex = newIdx;
}

//  FONT SYSTEM
// ══════════════════════════════════════════════
let currentFont = 'sf';
let currentFontSize = 16; // px, applied to html root so rem scales globally
const FONT_SIZE_MIN = 12;
const FONT_SIZE_MAX = 22;

function setFont(f) {
  currentFont = f;
  document.body.classList.remove('font-sf','font-serif','font-mono');
  document.body.classList.add('font-' + f);
  ['sf','serif','mono'].forEach(id => {
    document.getElementById('font-' + id).classList.toggle('active', id === f);
  });
}

function adjustSize(delta) {
  currentFontSize = Math.min(FONT_SIZE_MAX, Math.max(FONT_SIZE_MIN, currentFontSize + delta));

const navHistory = ['home'];
let navPos = 0;

function navPush(state) {
  // Trim forward history when navigating to a new state
  navHistory.splice(navPos + 1);
  navHistory.push(state);
  navPos = navHistory.length - 1;
}

function navBack() {
  if (navPos <= 0) return;
  navPos--;
  applyNavState(navHistory[navPos]);
}

function navForward() {
  if (navPos >= navHistory.length - 1) return;
  navPos++;
  applyNavState(navHistory[navPos]);
}

  if (state === 'home') {
    document.getElementById('screen-home').classList.add('active');

// ── Detect numeric / value query ──────────────
function isValueQuery(raw) {
  return /[\d]/.test(raw) || /^[<>≥≤~]/.test(raw.trim());
}

// ── Score a card's value text against a numeric query ──
function scoreValueMatch(raw, card) {
  const q = raw.trim().toLowerCase();
  const digitsOnly = q.replace(/[^0-9.]/g, '');
  if (!digitsOnly) return { matched: false };
  const caText = (card.ca || '').toLowerCase();
  const usText = (card.us || '').toLowerCase();
  const caHit = caText.includes(digitsOnly) || caText.replace(/[^0-9.]/g,'').includes(digitsOnly);
  const usHit = usText.includes(digitsOnly) || usText.replace(/[^0-9.]/g,'').includes(digitsOnly);
  if (!caHit && !usHit) return { matched: false };
  function highlight(text, digits) {
    if (!text) return '';
    const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const re = new RegExp(digits.replace(/\./g,'\\.'), 'g');
    return escaped.replace(re, m => `<span class="val-match">${m}</span>`);
  }
  const highlightedCa = caHit && card.ca ? highlight(card.ca.split('\n')[0], digitsOnly) : (card.ca ? card.ca.split('\n')[0] : '');
  const highlightedUs = usHit && card.us ? highlight(card.us.split('\n')[0], digitsOnly) : (card.us ? card.us.split('\n')[0] : '');
  const score = (caText.includes(digitsOnly) || usText.includes(digitsOnly)) ? 0 : 1;
  return { matched: true, caHit, usHit, highlightedCa, highlightedUs, score };
}

function positionTrack(animate) {

  document.getElementById('fc-counter').textContent = `Card ${fcIndex + 1} of ${total}`;
}

function nextCard() { if (fcIndex < activeCat.cards.length - 1) { fcIndex++; positionTrack(true); } }
function prevCard() { if (fcIndex > 0) { fcIndex--; positionTrack(true); } }
function shuffleCards() {
  for (let i = fcOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcOrder[i], fcOrder[j]] = [fcOrder[j], fcOrder[i]];
  }

}

// ── SWIPE ─────────────────────────────────────
function initSwipe() {
  const viewport = document.getElementById('fc-viewport');
  let startX = 0, startY = 0, isDragging = false, isHorizontal = null;
  swipeMovedX = 0;

  function onStart(x, y) {
    startX = x; startY = y; isDragging = true; swipeMovedX = 0; isHorizontal = null;
    const track = document.getElementById('fc-track');
    if (track) track.style.transition = 'none';
  }
  function onMove(x, y) {
    if (!isDragging) return;
    const dx = x - startX, dy = y - startY;
    if (isHorizontal === null && (Math.abs(dx) > 5 || Math.abs(dy) > 5))
      isHorizontal = Math.abs(dx) > Math.abs(dy);
    if (!isHorizontal) return;
    swipeMovedX = dx;
    const track = document.getElementById('fc-track');
    if (track) track.style.transform = `translateX(calc(-${fcIndex * 100}% + ${swipeMovedX}px))`;
  }
  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    if (!isHorizontal || !activeCat) return;
    const threshold = viewport.offsetWidth * 0.25;
    if (swipeMovedX < -threshold && fcIndex < activeCat.cards.length - 1) fcIndex++;
    else if (swipeMovedX > threshold && fcIndex > 0) fcIndex--;
    positionTrack(true);
    document.getElementById('swipe-hint').classList.add('hidden');
  }

  viewport.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  viewport.addEventListener('touchmove',  e => onMove(e.touches[0].clientX, e.touches[0].clientY),  { passive: true });
  viewport.addEventListener('touchend', onEnd);
  viewport.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => { if (isDragging) onMove(e.clientX, e.clientY); });
  window.addEventListener('mouseup', onEnd);

  viewport.addEventListener('click', e => {
    if (Math.abs(swipeMovedX) > 8) return;
    const slide = e.target.closest('.fc-slide');
    if (!slide) return;
    const flipper = slide.querySelector('.flipper');
    if (flipper) flipper.classList.toggle('flipped');
  });
}

            <span class="opt-letter">${letters[oi]}</span>${opt}

      </div>

function answerQuiz(qi, oi) {
  if (quizAnswered[qi] !== null) return;
  quizAnswered[qi] = oi;
  if (oi === activeCat.quiz[qi].ans) quizScore++;
  renderQuiz();
  if (quizAnswered.every(a => a !== null)) setTimeout(showScore, 500);
}

function showScore() {
  const el = document.getElementById('quiz-score');
  const pct = Math.round((quizScore / activeCat.quiz.length) * 100);
  const msg = pct===100?'🏆 Perfect!':pct>=75?'🎉 Great job!':pct>=50?'📚 Keep studying!':'💪 Review the reference first!';
  document.getElementById('score-num').textContent = `${quizScore}/${activeCat.quiz.length}`;
  document.getElementById('score-label').textContent = `${pct}% — ${msg}`;
  el.classList.add('show');
  el.scrollIntoView({ behavior:'smooth', block:'center' });
}

(function detectPlatform() {
  const ua = navigator.userAgent;
  const isMac    = /Macintosh/.test(ua) && !('ontouchend' in document);
  const isIPad   = /iPad/.test(ua) || (/Macintosh/.test(ua) && 'ontouchend' in document);
  const isIPhone = /iPhone/.test(ua);

  if (isIPad)        document.body.classList.add('platform-ipados');
  else if (isIPhone) document.body.classList.add('platform-ios');
  else if (isMac)    document.body.classList.add('platform-macos');
  // All others (Android, Windows, etc.) get neither — use default in-page search bar
})();

// ══════════════════════════════════════════════
//  UNIFIED SEARCH HANDLER
//  platform = 'default' | 'ios' | 'ipad' | 'mac'
// ══════════════════════════════════════════════
function getSearchEls(platform) {
  switch(platform) {
    case 'ios':    return { input: document.getElementById('ios-search-input'),    results: document.getElementById('ios-search-results') };
    case 'ipad':   return { input: document.getElementById('ipad-search-input'),   results: document.getElementById('ipad-search-results') };
    case 'mac':    return { input: document.getElementById('mac-search-input'),    results: document.getElementById('mac-search-results') };
    case 'pencil': return { input: document.getElementById('pencil-bubble-input'), results: document.getElementById('pencil-bubble-results') };
    default:       return { input: document.getElementById('search-input'),         results: document.getElementById('search-results') };
  }
}

let activePlatform = 'default';

function handleSearchFrom(platform) {
  activePlatform = platform;
  const { input, results } = getSearchEls(platform);
  const raw = input.value.trim();
  kbIndex = -1;

  if (!searchIndex) searchIndex = buildSearchIndex();

  if (!raw) { results.classList.remove('open'); return; }

  // Re-use existing search logic by temporarily routing results
  _runSearch(raw, results);
}

// Override handleSearch to use active platform's elements
function handleSearch() {
  const plat = document.body.classList.contains('platform-ipados') ? 'ipad'
             : document.body.classList.contains('platform-macos')  ? 'mac'
             : 'default';

// Core search logic — decoupled from DOM element IDs
function _runSearch(raw, resultsEl) {
  kbIndex = -1;
  if (!searchIndex) searchIndex = buildSearchIndex();
  if (!raw) { resultsEl.classList.remove('open'); return; }

  if (isValueQuery(raw)) {
    const valueHits = [];
    for (const item of searchIndex) {
      if (item.type !== 'card') continue;
      const vm = scoreValueMatch(raw, item.card);
      if (vm.matched) valueHits.push({ ...item, vm });
    }
    valueHits.sort((a,b) => a.vm.score - b.vm.score);
    if (!valueHits.length) {
      resultsEl.innerHTML = `<div class="sr-empty">No values containing "<strong>${raw}</strong>"</div>`;
      resultsEl.classList.add('open'); return;
    }
    let html = `<div class="sr-section-label value-section">🔢 Values containing "${raw}"</div>`;
    valueHits.slice(0,10).forEach(item => {
      const { highlightedCa, highlightedUs, caHit, usHit } = item.vm;
      let valDisplay = '';
      if (flagMode==='ca') valDisplay = caHit?`🇨🇦 ${highlightedCa}`:(item.card.ca?`🇨🇦 ${item.card.ca.split('\n')[0]}`:'');
      else if (flagMode==='us') valDisplay = usHit?`🇺🇸 ${highlightedUs}`:(item.card.us?`🇺🇸 ${item.card.us.split('\n')[0]}`:'');
      else {
        const caL=`🇨🇦 ${highlightedCa||(item.card.ca?item.card.ca.split('\n')[0]:'')}`;
        const usL=`🇺🇸 ${highlightedUs||(item.card.us?item.card.us.split('\n')[0]:'')}`;
        valDisplay=(item.card.ca&&item.card.us)?`${caL}<br>${usL}`:caL||usL;
      }
      html+=`<div class="sr-item value-hit" onclick="openToCard('${item.cat.id}',${item.cardIdx})">
        <div class="sr-item-icon">${item.cat.icon}</div>
        <div class="sr-item-abbr">${item.card.abbr}</div>
        <div class="sr-item-info"><div class="sr-item-name">${item.card.name}</div><div class="sr-item-cat">${item.cat.name}</div></div>
        <div class="sr-item-val value-hit">${valDisplay}</div></div>`;
    });
    resultsEl.innerHTML=html; resultsEl.classList.add('open');
    const items=resultsEl.querySelectorAll('.sr-item');
    if(items.length) { items[0].classList.add('kb-focus'); kbIndex=0; }
    return;
  }

  // Normal text search
  const scored=[];
  for(const item of searchIndex){
    if(item.type==='card'){const{score,tier}=scoreCard(raw,item.card,item.cat);if(score<999)scored.push({...item,score,tier});}
    else{const score=scoreCat(raw,item.cat);if(score<999)scored.push({...item,score,tier:3});}
  }
  scored.sort((a,b)=>{const tA=a.type==='card'?a.tier:3,tB=b.type==='card'?b.tier:3;return tA!==tB?tA-tB:a.score-b.score;});
  const seen=new Set();
  const unique=scored.filter(i=>{const k=i.type==='card'?`${i.cat.id}::${i.card.abbr}`:`cat::${i.cat.id}`;if(seen.has(k))return false;seen.add(k);return true;});
  if(!unique.length){resultsEl.innerHTML=`<div class="sr-empty">No results for "<strong>${raw}</strong>"</div>`;resultsEl.classList.add('open');return;}

  const t1=unique.filter(i=>i.type==='card'&&i.tier===1);
  const t2=unique.filter(i=>i.type==='card'&&i.tier===2);
  const cats=unique.filter(i=>i.type==='cat').slice(0,3);
  const showCards=t1.length?t1.slice(0,8):t2.slice(0,6);

  let html='';
  if(showCards.length){
    html+=`<div class="sr-section-label">↑↓ Navigate · Enter to open</div>`;
    showCards.forEach(item=>{
      let v='';
      if(flagMode==='us') v=item.card.us?`🇺🇸 ${item.card.us.split('\n')[0]}`:(item.card.ca?`🇨🇦 ${item.card.ca.split('\n')[0]}`:'');
      else if(flagMode==='ca') v=item.card.ca?`🇨🇦 ${item.card.ca.split('\n')[0]}`:(item.card.us?`🇺🇸 ${item.card.us.split('\n')[0]}`:'');
      else{const ca=item.card.ca?`🇨🇦 ${item.card.ca.split('\n')[0]}`:'',us=item.card.us?`🇺🇸 ${item.card.us.split('\n')[0]}`:'';v=ca&&us?`${ca} · ${us}`:ca||us;}
      html+=`<div class="sr-item" onclick="openToCard('${item.cat.id}',${item.cardIdx})">
        <div class="sr-item-icon">${item.cat.icon}</div>
        <div class="sr-item-abbr">${item.card.abbr}</div>
        <div class="sr-item-info">
          <div class="sr-item-name">${item.card.name}</div>
          ${item.card.alt?`<div class="sr-item-alt">${item.card.alt.split(' · ').slice(0,2).join(' · ')}</div>`:''}
          <div class="sr-item-cat">${item.cat.name}</div>
        </div>
        <div class="sr-item-val">${v}</div></div>`;
    });
  }
  const goodCats=cats.filter(i=>i.score<=4);
  const showCats=showCards.length===0?cats:goodCats;
  if(showCats.length){
    html+=`<div class="sr-section-label">Categories</div>`;
    showCats.forEach(item=>{html+=`<div class="sr-item" onclick="openCategory(DB.find(c=>c.id==='${item.cat.id}'))">
      <div class="sr-item-icon">${item.cat.icon}</div>
      <div class="sr-item-abbr" style="font-size:0.75rem">${item.cat.name}</div>
      <div class="sr-item-info"><div class="sr-item-cat">${item.cat.cards.length} cards</div></div></div>`;});
  }
  resultsEl.innerHTML=html; resultsEl.classList.add('open');
  const items=Array.from(resultsEl.querySelectorAll('.sr-item'));
  if(items.length){items[0].classList.add('kb-focus');kbIndex=0;}
}

// ══════════════════════════════════════════════
//  iOS OVERLAY  — keyboard pulls up with FAB tap
// ══════════════════════════════════════════════
function openIosOverlay() {
  const overlay = document.getElementById('ios-search-overlay');
  const input   = document.getElementById('ios-search-input');

  overlay.classList.add('open');

  // iOS requires the element to be visible AND focused in same user-gesture tick.
  // We create a temporary invisible input, focus it immediately (within the tap
  // gesture), then swap to the real input once the overlay is painted.
  const tmp = document.createElement('input');
  tmp.setAttribute('type', 'text');
  tmp.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;font-size:16px;';
  document.body.appendChild(tmp);
  tmp.focus();                     // triggers keyboard within gesture tick

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {  // wait two frames so overlay is fully painted
      input.focus();               // move focus to real input — keyboard stays up
      tmp.remove();
    });
  });
}

function closeIosOverlay() {
  const overlay = document.getElementById('ios-search-overlay');
  overlay.classList.remove('open');
  document.getElementById('ios-search-input').value = '';
  document.getElementById('ios-search-results').classList.remove('open');
  document.getElementById('ios-search-results').innerHTML = '';
}

// ══════════════════════════════════════════════
//  macOS SEARCH PANEL (slides down)
// ══════════════════════════════════════════════
let macSearchOpen = false;
function openMacSearch(seedChar) {
  const panel = document.getElementById('mac-hidden-search');
  const input = document.getElementById('mac-search-input');
  panel.classList.add('mac-open');
  macSearchOpen = true;
  input.focus();
  if (seedChar) { input.value = seedChar; handleSearchFrom('mac'); }
  else { input.select(); }
}
function closeMacSearch() {
  document.getElementById('mac-hidden-search').classList.remove('mac-open');
  document.getElementById('mac-search-results').classList.remove('open');
  document.getElementById('mac-search-input').value = '';
  macSearchOpen = false;
}

// ══════════════════════════════════════════════
//  APPLE PENCIL HOVER (iPadOS only)
//  Uses pointer events with pointerType === 'pen'
// ══════════════════════════════════════════════
(function initPencilHover() {
  if (!document.body.classList.contains('platform-ipados')) return;

  const bubble   = document.getElementById('pencil-bubble');
  const input    = document.getElementById('pencil-bubble-input');
  const results  = document.getElementById('pencil-bubble-results');
  let   hideTimer = null;
  let   bubbleVisible = false;

  // Margin from pencil tip to bubble edge
  const OFFSET_X = 12;
  const OFFSET_Y = 24;
  const BUBBLE_W = 320;
  const BUBBLE_H = 120; // approximate before results load

  function showBubble(x, y) {
    clearTimeout(hideTimer);

    // Position bubble so it never goes off-screen
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    let left = x + OFFSET_X;
    let top  = y + OFFSET_Y;

    // Flip left if too close to right edge
    if (left + BUBBLE_W > vw - 12) left = x - BUBBLE_W - OFFSET_X;
    // Flip up if too close to bottom
    if (top + BUBBLE_H > vh - 12) top = y - BUBBLE_H - OFFSET_Y;

    bubble.style.left = Math.max(8, left) + 'px';
    bubble.style.top  = Math.max(8, top)  + 'px';

    if (!bubbleVisible) {
      bubble.classList.add('visible');
      bubbleVisible = true;
    }
  }

  function schedulehide() {
    hideTimer = setTimeout(() => {
      // Only hide if Pencil is no longer over the bubble
      bubble.classList.remove('visible');
      bubbleVisible = false;
      // Clear search when bubble hides
      setTimeout(() => {
        if (!bubbleVisible) {
          input.value = '';
          results.classList.remove('open');
          results.innerHTML = '';
        }
      }, 300);
    }, 1200); // 1.2s grace period — enough to tap into the input
  }

  // Pencil hover (pointerType = 'pen', no button pressed)
  document.addEventListener('pointermove', e => {
    if (e.pointerType !== 'pen') return;
    showBubble(e.clientX, e.clientY);
  });

  // Pencil leaves the hover range
  document.addEventListener('pointerleave', e => {
    if (e.pointerType !== 'pen') return;
    schedulehide();
  });

  // Cancel hide if Pencil comes back or user taps into bubble
  bubble.addEventListener('pointerenter', () => clearTimeout(hideTimer));
  bubble.addEventListener('pointerleave', schedulehide);
  input.addEventListener('focus', () => clearTimeout(hideTimer));
  input.addEventListener('blur', schedulehide);

  // Tapping anywhere outside bubble closes it
  document.addEventListener('pointerdown', e => {
    if (e.pointerType === 'pen') return; // let pen handle its own flow
    if (!bubble.contains(e.target)) schedulehide();
  });
})();

// ══════════════════════════════════════════════
//  UPDATED KEYBOARD HANDLER (platform-aware)
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const isMacOS   = document.body.classList.contains('platform-macos');
  const isIPadOS  = document.body.classList.contains('platform-ipados');
  const isIOS     = document.body.classList.contains('platform-ios');

  // Active input / results for current platform
  const plat = isMacOS ? 'mac' : isIPadOS ? 'ipad' : 'default';
  const { input, results } = getSearchEls(plat);
  const isTypingInSearch = document.activeElement === input ||
    document.activeElement === document.getElementById('ios-search-input');
  const isTypingAnywhere = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName);
  const isOpen = results.classList.contains('open') ||
    document.getElementById('ios-search-results')?.classList.contains('open');

  // [ = Back, ] = Forward
  if ((e.key==='['||e.key===']') && !isTypingAnywhere) {
    e.preventDefault();
    e.key==='['?navBack():navForward(); return;
  }

  // Escape — close whatever is open
  if (e.key === 'Escape') {
    if (isIOS && document.getElementById('ios-search-overlay').classList.contains('open')) {
      closeIosOverlay(); return;
    }
    if (isMacOS && macSearchOpen) { closeMacSearch(); return; }
    if (isOpen) { results.classList.remove('open'); input.blur(); kbIndex=-1; return; }
  }

  // Arrow + Enter in open results
  if (isOpen) {
    const activeResults = isIOS
      ? document.getElementById('ios-search-results')
      : results;
    const items = Array.from(activeResults.querySelectorAll('.sr-item'));
    if (items.length) {
      if (e.key==='ArrowDown'){e.preventDefault();updateKbFocus(items,Math.min(kbIndex+1,items.length-1));return;}
      if (e.key==='ArrowUp'){e.preventDefault();updateKbFocus(items,Math.max(kbIndex-1,0));return;}
      if (e.key==='Enter'){e.preventDefault();const t=kbIndex>=0?kbIndex:0;if(items[t]){items[t].click();kbIndex=-1;}return;}
    }
  }

  // / = focus search
  if (e.key==='/' && !isTypingAnywhere) {
    e.preventDefault();
    if (isMacOS) openMacSearch();
    else if (isIOS) openIosOverlay();
    else focusSearch();
    return;
  }

  // Auto-type → search
  if (!isTypingAnywhere && !e.metaKey && !e.ctrlKey && !e.altKey && e.key.length===1) {
    e.preventDefault();
    if (isMacOS) openMacSearch(e.key);
    else if (isIOS) { openIosOverlay(); setTimeout(()=>{const i=document.getElementById('ios-search-input');i.value=e.key;handleSearchFrom('ios');},120); }
    else focusSearch(e.key);
  }
});

renderHome('');
initSwipe();
</script>
